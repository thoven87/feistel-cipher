name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Swift 6.3 · Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Build
        run: swift build --configuration release

      - name: Test
        run: swift test --parallel
